<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>飲控助手</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen pb-24 text-slate-800 bg-slate-50">

    <div class="max-w-2xl mx-auto px-4 pt-8">
        <!-- 頂部概覽 -->
        <header class="mb-8 flex justify-between items-start">
            <div>
                <h1 class="text-2xl font-black flex items-center gap-2 tracking-tight">
                    <i data-lucide="layout-dashboard" class="text-emerald-500"></i>
                    飲控助手
                </h1>
                <p class="text-slate-400 text-sm font-medium mt-1">
                    <span id="currentDateLabel" class="text-emerald-600 font-bold">今天</span>
                </p>
            </div>
            <div class="flex flex-col items-end">
                <div class="text-[10px] font-bold text-slate-300 uppercase tracking-[0.15em] mb-1">飲水進度</div>
                <div class="flex items-center gap-2">
                    <div class="w-32 h-2 bg-slate-200 rounded-full overflow-hidden">
                        <div id="waterMainBar" class="h-full bg-sky-400 progress-bar" style="width: 0%"></div>
                    </div>
                    <span id="waterMainText" class="text-xs font-black text-sky-600 tabular-nums">0%</span>
                </div>
            </div>
        </header>

        <!-- 主數據區域 -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="glass-card p-6 rounded-[2rem] shadow-sm text-center relative">
                <div class="relative inline-flex items-center justify-center">
                    <svg class="w-40 h-40 transform -rotate-90">
                        <circle cx="80" cy="80" r="72" stroke="currentColor" stroke-width="10" fill="transparent" class="text-slate-100" />
                        <circle id="calorieCircle" cx="80" cy="80" r="72" stroke="currentColor" stroke-width="10" fill="transparent" stroke-dasharray="452.38" stroke-dashoffset="452.38" class="text-emerald-500 progress-bar" stroke-linecap="round" />
                    </svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                        <span id="displayCalories" class="text-4xl font-black text-slate-700 leading-none tabular-nums">0</span>
                        <span class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-2">kcal 攝取</span>
                    </div>
                </div>
                <div id="calorieStatus" class="mt-4 text-xs font-bold text-slate-500 tracking-wide">
                    目標 <span id="targetKcalDisplay" class="tabular-nums">--</span> kcal
                </div>
            </div>

            <div class="glass-card p-6 rounded-[2rem] shadow-sm space-y-4">
                <h3 class="text-sm font-black text-slate-700 mb-2 tracking-wide">三大營養素 (g)</h3>
                <div class="space-y-4" id="macroBarsContainer">
                    <div>
                        <div class="flex justify-between text-[10px] font-bold mb-1.5">
                            <span class="text-blue-500 font-black">蛋白質</span>
                            <span class="text-slate-400 tabular-nums"><span id="proteinText">0</span> / <span id="targetProteinDisplay">--</span></span>
                        </div>
                        <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                            <div id="proteinBar" class="bg-blue-400 h-full progress-bar" style="width: 0%"></div>
                        </div>
                    </div>
                    <div>
                        <div class="flex justify-between text-[10px] font-bold mb-1.5">
                            <span class="text-amber-500 font-black">碳水化合物</span>
                            <span class="text-slate-400 tabular-nums"><span id="carbsText">0</span> / <span id="targetCarbsDisplay">--</span></span>
                        </div>
                        <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                            <div id="carbsBar" class="bg-amber-400 h-full progress-bar" style="width: 0%"></div>
                        </div>
                    </div>
                    <div>
                        <div class="flex justify-between text-[10px] font-bold mb-1.5">
                            <span class="text-rose-500 font-black">脂肪</span>
                            <span class="text-slate-400 tabular-nums"><span id="fatText">0</span> / <span id="targetFatDisplay">--</span></span>
                        </div>
                        <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                            <div id="fatBar" class="bg-rose-400 h-full progress-bar" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 按鈕區 -->
        <div class="grid grid-cols-3 gap-4 mb-8">
            <button onclick="ui.openModal('goalModal')" class="action-btn bg-emerald-50 text-emerald-600">
                <i data-lucide="target" size="20"></i>
                <span>設定目標</span>
            </button>
            <button onclick="ui.openModal('foodModal')" class="action-btn bg-blue-50 text-blue-600">
                <i data-lucide="utensils" size="20"></i>
                <span>記錄飲食</span>
            </button>
            <button onclick="ui.openModal('waterModal')" class="action-btn bg-sky-50 text-sky-600">
                <i data-lucide="droplets" size="20"></i>
                <span>記錄飲水</span>
            </button>
        </div>

        <!-- 明細列表 -->
        <div class="space-y-4">
            <h3 class="text-xs font-black text-slate-400 uppercase tracking-[0.2em] px-2">今日明細</h3>
            <div id="historyList" class="space-y-3"></div>
        </div>

        <!-- 底部導航 -->
        <footer class="mt-12 pt-8 border-t border-slate-200 space-y-6">
            <div class="glass-card p-4 rounded-3xl flex items-center justify-between gap-4">
                <div class="relative" id="calendarWrapper">
                    <div class="flex items-center gap-1 bg-white p-1 rounded-2xl border border-slate-100">
                        <button onclick="calendar.changeDateRelative(-1)" class="p-2 hover:bg-slate-50 rounded-xl text-slate-400 transition-colors"><i data-lucide="chevron-left" size="18"></i></button>
                        <div onclick="calendar.toggle()" id="dateDisplay" class="px-4 text-xs font-black text-slate-600 cursor-pointer hover:text-emerald-500 transition-colors tabular-nums tracking-wider">--</div>
                        <button onclick="calendar.changeDateRelative(1)" class="p-2 hover:bg-slate-50 rounded-xl text-slate-400 transition-colors"><i data-lucide="chevron-right" size="18"></i></button>
                    </div>
                    <div id="calendarModal" class="calendar-modal glass-card">
                        <div class="flex items-center justify-between mb-4 px-1">
                            <button onclick="calendar.changeViewMonth(-1)" class="p-1.5 hover:bg-slate-100 rounded-lg text-slate-400"><i data-lucide="chevron-left" size="16"></i></button>
                            <span id="calendarViewLabel" class="font-black text-sm text-slate-700 tracking-tight"></span>
                            <button onclick="calendar.changeViewMonth(1)" class="p-1.5 hover:bg-slate-100 rounded-lg text-slate-400"><i data-lucide="chevron-right" size="16"></i></button>
                        </div>
                        <div class="grid grid-cols-7 text-center text-[9px] font-black text-slate-300 mb-2 uppercase">
                            <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
                        </div>
                        <div id="calendarGrid" class="grid grid-cols-7 gap-1"></div>
                    </div>
                </div>
                <button onclick="calendar.goToToday()" class="text-xs font-black text-emerald-600 hover:bg-emerald-50 px-5 py-2.5 rounded-xl transition-all tracking-wide">回到今天</button>
            </div>

            <!-- 備份區塊 -->
            <div class="flex items-center justify-center gap-4 text-slate-400">
                <button onclick="storage.export()" class="flex items-center gap-2 text-[10px] hover:text-emerald-600 transition-colors uppercase font-black tracking-widest">
                    <i data-lucide="download" size="14"></i> 匯出備份
                </button>
                <div class="w-px h-3 bg-slate-200"></div>
                <label class="flex items-center gap-2 text-[10px] hover:text-emerald-600 transition-colors cursor-pointer uppercase font-black tracking-widest">
                    <i data-lucide="upload" size="14"></i> 匯入資料
                    <input type="file" id="importFile" class="hidden" accept=".json" onchange="storage.import(event)">
                </label>
            </div>
        </footer>
    </div>

    <!-- MODAL: 設定目標 (更新下拉選單邏輯) -->
    <div id="goalModal" class="modal-overlay">
        <div class="glass-card w-full max-w-sm rounded-[2.5rem] p-8 animate-modalIn shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-black text-slate-800 tracking-tight">設定攝取目標</h2>
                <button onclick="ui.closeModal('goalModal')" class="text-slate-300 hover:text-slate-600 transition-colors"><i data-lucide="x"></i></button>
            </div>
            
            <!-- 更新：下拉選單選擇模板 -->
            <div class="mb-8">
                <label class="input-label mb-2">選擇營養模板</label>
                <div class="relative">
                    <select id="templateSelect" onchange="app.handleTemplateChange(this.value)" class="w-full p-4 rounded-2xl bg-slate-100 border-none outline-none font-bold text-slate-700 appearance-none cursor-pointer">
                        <!-- JS 動態渲染模板選項 -->
                    </select>
                    <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
                        <i data-lucide="chevron-down" size="18"></i>
                    </div>
                </div>
            </div>

            <div class="space-y-5">
                <div><label class="input-label text-blue-500">蛋白質目標 (g)</label><input type="number" id="targetProtein" oninput="app.updateTargets()" class="modal-input text-blue-600"></div>
                <div><label class="input-label text-amber-500">碳水目標 (g)</label><input type="number" id="targetCarbs" oninput="app.updateTargets()" class="modal-input text-amber-600"></div>
                <div><label class="input-label text-rose-500">脂肪目標 (g)</label><input type="number" id="targetFat" oninput="app.updateTargets()" class="modal-input text-rose-600"></div>
                <div><label class="input-label text-sky-500">飲水目標 (ml)</label><input type="number" id="targetWater" oninput="app.updateTargets()" class="modal-input text-sky-600"></div>
            </div>
            <button onclick="ui.closeModal('goalModal')" class="w-full mt-10 bg-slate-800 text-white font-black py-4 rounded-2xl shadow-xl hover:bg-slate-700 transition-all tracking-wide">儲存設定</button>
        </div>
    </div>

    <!-- 新增：MODAL: 新增模板視窗 -->
    <div id="newTemplateModal" class="modal-overlay">
        <div class="glass-card w-full max-w-sm rounded-[2.5rem] p-8 animate-modalIn shadow-2xl">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-xl font-black text-slate-800 tracking-tight">建立新模板</h2>
                <button onclick="ui.closeModal('newTemplateModal'); ui.openModal('goalModal');"><i data-lucide="arrow-left" class="text-slate-400"></i></button>
            </div>
            <div class="space-y-5">
                <div><label class="input-label">模板名稱</label><input type="text" id="tplName" placeholder="例如：增肌期" class="modal-input"></div>
                <div class="grid grid-cols-3 gap-3">
                    <div><label class="input-label text-blue-400">蛋白質</label><input type="number" id="tplProtein" placeholder="0" class="modal-input"></div>
                    <div><label class="input-label text-amber-400">碳水</label><input type="number" id="tplCarbs" placeholder="0" class="modal-input"></div>
                    <div><label class="input-label text-rose-400">脂肪</label><input type="number" id="tplFat" placeholder="0" class="modal-input"></div>
                </div>
                <div><label class="input-label text-sky-500">飲水目標 (ml)</label><input type="number" id="tplWater" placeholder="2000" class="modal-input"></div>
            </div>
            <button onclick="app.saveNewTemplate()" class="w-full mt-10 bg-emerald-600 text-white font-black py-4 rounded-2xl shadow-xl hover:bg-emerald-700 transition-all tracking-wide">儲存模板</button>
        </div>
    </div>

    <!-- MODAL: 新增飲食 -->
    <div id="foodModal" class="modal-overlay">
        <div class="glass-card w-full max-w-md rounded-[2.5rem] p-8 animate-modalIn relative shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-black text-slate-800 tracking-tight">新增飲食</h2>
                <button onclick="ui.closeModal('foodModal')" class="text-slate-300 hover:text-slate-600 transition-colors"><i data-lucide="x"></i></button>
            </div>
            
            <div class="relative mb-6" id="commonFoodDropdown">
                <div class="flex items-center bg-slate-50 rounded-2xl px-4 py-1 focus-within:ring-2 focus-within:ring-blue-400 transition-all border border-slate-200">
                    <i data-lucide="search" size="18" class="text-slate-400 mr-2"></i>
                    <input type="text" id="commonSearch" placeholder="搜尋常用清單..." 
                           onmousedown="event.stopPropagation(); app.showCommon()" 
                           oninput="ui.filterCommon()" 
                           autocomplete="off" 
                           class="w-full bg-transparent py-3 outline-none font-bold text-slate-700 text-sm">
                    <button onclick="app.toggleCommon(event)" class="p-1 hover:bg-slate-200 rounded-lg transition-colors ml-2">
                        <i data-lucide="chevron-down" id="dropdownArrowIcon" size="18" class="text-slate-400 transition-transform duration-300"></i>
                    </button>
                </div>
                <div id="commonDropdownList" 
                     onmousedown="event.stopPropagation()"
                     class="dropdown-content custom-scrollbar glass-card mt-2"></div>
            </div>

            <div class="space-y-5">
                <div>
                    <label class="input-label text-slate-400">餐點名稱</label>
                    <input type="text" id="itemName" placeholder="例如：水煮雞胸肉" class="modal-input text-lg">
                </div>
                <div class="flex gap-4">
                    <div class="flex-1">
                        <label class="input-label text-slate-400">份數</label>
                        <input type="number" id="inputServings" value="1" step="0.1" class="modal-input tabular-nums">
                    </div>
                    <div class="flex-1 flex flex-col justify-end pb-1">
                         <span class="text-[10px] text-slate-300 font-bold italic text-right leading-none">* 自動計算總量</span>
                    </div>
                </div>
                <div class="grid grid-cols-3 gap-3">
                    <div><label class="input-label text-blue-400">蛋白/份</label><input type="number" id="inputProtein" placeholder="0" class="modal-input tabular-nums"></div>
                    <div><label class="input-label text-amber-400">碳水/份</label><input type="number" id="inputCarbs" placeholder="0" class="modal-input tabular-nums"></div>
                    <div><label class="input-label text-rose-400">脂肪/份</label><input type="number" id="inputFat" placeholder="0" class="modal-input tabular-nums"></div>
                </div>
            </div>
            <button onclick="app.addFood()" class="w-full mt-8 bg-slate-800 text-white font-black py-4 rounded-2xl shadow-xl hover:bg-slate-700 transition-all tracking-wide">確認新增</button>
        </div>
    </div>

    <!-- MODAL: 修改飲食紀錄 -->
    <div id="editFoodModal" class="modal-overlay">
        <div class="glass-card w-full max-w-md rounded-[2.5rem] p-8 animate-modalIn relative shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-black text-slate-800 tracking-tight">修改數據</h2>
                <button onclick="ui.closeModal('editFoodModal')" class="text-slate-300 hover:text-slate-600 transition-colors"><i data-lucide="x"></i></button>
            </div>
            <div class="space-y-5">
                <div>
                    <label class="input-label text-slate-400">餐點名稱</label>
                    <input type="text" id="editItemName" class="modal-input text-lg">
                </div>
                <div class="grid grid-cols-3 gap-3">
                    <div><label class="input-label text-blue-400">蛋白質 (g)</label><input type="number" id="editProtein" class="modal-input tabular-nums"></div>
                    <div><label class="input-label text-amber-400">碳水 (g)</label><input type="number" id="editCarbs" class="modal-input tabular-nums"></div>
                    <div><label class="input-label text-rose-400">脂肪 (g)</label><input type="number" id="editFat" class="modal-input tabular-nums"></div>
                </div>
            </div>
            <button onclick="app.saveFoodEdit()" class="w-full mt-8 bg-emerald-600 text-white font-black py-4 rounded-2xl shadow-xl tracking-wide">確認修改</button>
        </div>
    </div>

    <!-- MODAL: 記錄飲水 -->
    <div id="waterModal" class="modal-overlay">
        <div class="glass-card w-full max-w-sm rounded-[2.5rem] p-8 animate-modalIn shadow-2xl">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-xl font-black text-slate-800 tracking-tight">補充水分</h2>
                <button onclick="ui.closeModal('waterModal')" class="text-slate-300 hover:text-slate-600 transition-colors"><i data-lucide="x"></i></button>
            </div>
            <div class="space-y-8">
                <div class="relative">
                    <input type="number" id="waterInput" placeholder="0" class="w-full p-6 rounded-2xl bg-sky-50 border-none outline-none font-black text-5xl text-sky-600 text-center tabular-nums">
                    <span class="absolute right-6 top-1/2 -translate-y-1/2 font-black text-sky-200 text-xl tracking-tighter">ml</span>
                </div>
                <div class="grid grid-cols-3 gap-3">
                    <button onclick="app.quickWater(300)" class="water-quick-btn">300<span class="text-[10px] block font-bold">ml</span></button>
                    <button onclick="app.quickWater(500)" class="water-quick-btn">500<span class="text-[10px] block font-bold">ml</span></button>
                    <button onclick="app.quickWater(800)" class="water-quick-btn">800<span class="text-[10px] block font-bold">ml</span></button>
                </div>
                <button onclick="app.addWater()" class="w-full bg-sky-500 text-white font-black py-4 rounded-2xl shadow-xl tracking-wide">確認新增</button>
            </div>
        </div>
    </div>

    <div id="msgBox" class="fixed bottom-24 left-1/2 -translate-x-1/2 bg-slate-900/95 backdrop-blur text-white px-10 py-4 rounded-2xl shadow-2xl opacity-0 pointer-events-none transition-all duration-300 z-[7000] text-xs font-black uppercase tracking-widest"></div>

    <script src="storage.js"></script>
    <script src="calendar.js"></script>
    <script src="main.js"></script>
</body>
</html>
